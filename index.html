<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAIR Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div class="top-bar-left">
        <span class="app-title">FAIR Calculator</span>
        <span class="app-subtitle">Factor Analysis of Information Risk</span>
      </div>
      <div class="top-bar-right">
      </div>
    </header>
    <main id="panels">
      <section id="input-panel" aria-label="Risk Factor Inputs">
      </section>
      <section id="results-panel" aria-label="Simulation Results" aria-live="polite">
      </section>
    </main>
  </div>

  <script src="vendor/echarts.min.js"></script>
  <script src="vendor/pako.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
