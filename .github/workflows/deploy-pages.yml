# Deploy static site to GitHub Pages
#
# Triggers on push to main branch and allows manual dispatch.
# Uses the GitHub Actions Pages deployment pipeline (no gh-pages branch needed).

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir _site
          cp index.html _site/
          cp LICENSE _site/
          cp README.md _site/
          cp DETAILS.md _site/
          cp -r css _site/css
          cp -r js _site/js
          cp -r vendor _site/vendor
          cp -r locales _site/locales
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
